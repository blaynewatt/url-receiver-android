<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #4f46e5;
      --primary-hover: #6366f1;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.08);
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 9999px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-badge.connected {
      color: var(--success);
      border-color: rgba(16, 185, 129, 0.3);
      background-color: rgba(16, 185, 129, 0.1);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .tab-info {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .tab-url {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background-color: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 16px;
      user-select: none;
    }

    .settings-header:hover {
      color: var(--text);
    }

    .settings-content {
      display: none;
      margin-top: 10px;
    }

    .settings-content.open {
      display: block;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      color: white;
      font-size: 12px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--primary);
    }

    .message {
      font-size: 12px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }

    .message.success {
      display: block;
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .message.error {
      display: block;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <h2>
    URL Sender
    <span id="status-badge" class="status-badge">Checking...</span>
  </h2>
  
  <div class="card">
    <div class="card-title">Active Tab</div>
    <div id="tab-title" class="tab-info">Loading page title...</div>
    <div id="tab-url" class="tab-url">Loading page URL...</div>
  </div>

  <button id="send-btn" class="btn" disabled>Send to Phone</button>
  
  <div id="msg" class="message"></div>

  <div id="settings-toggle" class="settings-header">
    <span>⚙️ Connection Settings</span>
    <span id="settings-arrow">▶</span>
  </div>

  <div id="settings-panel" class="settings-content">
    <div class="form-group">
      <label for="relay-url">Relay Server URL</label>
      <input type="text" id="relay-url" placeholder="http://192.168.1.100:8082">
    </div>
    <div class="form-group">
      <label for="secret-token">Secret Token</label>
      <input type="text" id="secret-token" placeholder="Enter session token">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
